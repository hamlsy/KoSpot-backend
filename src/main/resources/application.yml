spring:
  servlet:
    multipart:
      max-file-size: 50MB # 업로드 가능한 단일 파일 크기
      max-request-size: 60MB # 요청 전체 크기 (파일 + 폼 데이터 포함)
  profiles:
    active:
      - local
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    #      ddl-auto: create-drop # 임시로, 배포시 다시 update로 변경 필요
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        show_sql: false

    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
            scope:
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

          naver:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET}
            scope: email
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          kakao:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET}
            scope: account_email
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token_uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user_name_attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: ${SERVER_PORT:8080}
#  servlet:
#    context-path: /api

logging:
  level:
    root: info
    org.springframework.web: info

auth:
  success-redirect-uri: ${AUTH_SUCCESS_REDIRECT_URI}

app:
  jwt:
    secret: ${APP_JWT_SECRET}
  cors:
    front-path: ${APP_CORS_FRONT_PATH}

aes:
  secret-key: ${AES_SECRET_KEY}

cloud:
  aws:
    credentials:
      access-key: ${CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
      secret-key: ${CLOUD_AWS_CREDENTIALS_SECRET_KEY}
    region:
      static: ${CLOUD_AWS_REGION_STATIC}
    s3:
      bucket: ${CLOUD_AWS_S3_BUCKET}

websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS}


notification:
  ttl-days: 14

slack:
  enabled: ${SLACK_ENABLED:false}
  webhook:
    error-url: ${SLACK_WEBHOOK_ERROR_URL:}
    registration-url: ${SLACK_WEBHOOK_REGISTRATION_URL:}

chat:
  persist:
    enabled: ${CHAT_PERSIST_ENABLED:true}
    friend-only: true
    stream-key: chat:stream
    dlq-stream-key: chat:stream:dlq
    group: chat-persist-group
    consumer-name: ${spring.application.name:kospot-backend}-${HOSTNAME:local}
    batch-size: ${CHAT_PERSIST_BATCH_SIZE:500}
    read-count: ${CHAT_PERSIST_READ_COUNT:500}
    read-block-ms: ${CHAT_PERSIST_READ_BLOCK_MS:2000}
    flush-interval-ms: ${CHAT_PERSIST_FLUSH_INTERVAL_MS:1000}
    max-retry: ${CHAT_PERSIST_MAX_RETRY:5}
    shutdown-timeout-ms: ${CHAT_PERSIST_SHUTDOWN_TIMEOUT_MS:10000}
  transient:
    enabled: ${CHAT_TRANSIENT_ENABLED:true}
    ttl-days: ${CHAT_TRANSIENT_TTL_DAYS:14}

